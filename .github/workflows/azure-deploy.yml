name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (Next.js → Azure App Service)

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm config set minimum-release-age 0
          pnpm install

      - name: Run tests
        run: pnpm test:run

      - name: Build Next.js (standalone)
        run: pnpm build

      - name: Prepare standalone bundle
        run: |
          cp -r public .next/standalone/public || true
          cp -r .next/static .next/standalone/.next/static || true
          # Add package.json with start script so Oryx detects this as Node.js
          echo '{"name":"app","version":"1.0.0","scripts":{"start":"node server.js"}}' \
            > .next/standalone/package.json
          cd .next/standalone && zip -r ../../deploy.zip .

      - name: Deploy to Azure Web App via Kudu ZipDeploy
        env:
          PUBLISH_USER: ${{ secrets.AZURE_PUBLISH_USER }}
          PUBLISH_PASS: ${{ secrets.AZURE_PUBLISH_PASS }}
        run: |
          curl -X POST \
            "https://lipcoding-app-svc.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            --user "${PUBLISH_USER}:${PUBLISH_PASS}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy.zip \
            --max-time 300 \
            --fail \
            --show-error
