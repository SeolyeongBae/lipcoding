name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (Next.js → Azure App Service)

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm config set minimum-release-age 0
          pnpm install

      - name: Run tests
        run: pnpm test:run

      - name: Build Next.js (standalone)
        run: pnpm build

      - name: Prepare standalone bundle
        run: |
          cp -r public .next/standalone/public || true
          cp -r .next/static .next/standalone/.next/static || true

      - name: Zip standalone bundle
        run: cd .next/standalone && zip -r ../../deploy.zip . -x "*.git*"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name lipcoding-app-svc \
            --resource-group lipcoding-rg \
            --src-path deploy.zip \
            --type zip \
            --async false
