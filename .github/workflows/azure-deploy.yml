name: Deploy to Azure App Service

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy (Next.js → Azure App Service)

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          pnpm config set minimum-release-age 0
          pnpm install

      - name: Run tests
        run: pnpm test:run

      - name: Build Next.js (standalone)
        run: pnpm build

      - name: Prepare standalone bundle
        run: |
          cp -r public .next/standalone/public || true
          cp -r .next/static .next/standalone/.next/static || true

      - name: Zip standalone bundle
        run: cd .next/standalone && zip -r ../../deploy.zip .

      - name: Deploy via Kudu ZIP API
        run: |
          PUBLISH_PROFILE='${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}'
          USER=$(echo "$PUBLISH_PROFILE" | grep -oP 'publishMethod="ZipDeploy"[^/]*/>\s*<[^>]*userName="\K[^"]+' || \
                 echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userName=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          PASS=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, re
          xml = sys.stdin.read()
          m = re.search(r'publishMethod=\"ZipDeploy\"[^>]*userPWD=\"([^\"]+)\"', xml)
          print(m.group(1) if m else '')
          ")
          curl -X POST \
            "https://lipcoding-app-svc.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -u "$USER:$PASS" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @deploy.zip \
            --fail \
            --silent \
            --show-error
